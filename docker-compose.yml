services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fintech
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fintech -d fintech']
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build:
      context: .
      dockerfile: apps/producer/Dockerfile
    ports:
      - '3001:3001'
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://fintech:fintech@postgres:5432/fintech
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  consumer:
    build:
      context: .
      dockerfile: apps/consumer/Dockerfile
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://fintech:fintech@postgres:5432/fintech
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  notifier:
    build:
      context: .
      dockerfile: apps/notifier/Dockerfile
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://fintech:fintech@postgres:5432/fintech
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  admin:
    build:
      context: .
      dockerfile: apps/notifications-platform/Dockerfile
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://fintech:fintech@postgres:5432/fintech
      PRODUCER_INTERNAL_URL: http://producer:3001
      CONSUMER_INTERNAL_URL: http://consumer:3002
      NOTIFIER_INTERNAL_URL: http://notifier:3003
      RABBITMQ_MANAGEMENT_URL: http://rabbitmq:15672/api
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      producer:
        condition: service_started
      consumer:
        condition: service_started
      notifier:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: on-failure
